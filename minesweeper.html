<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 지뢰찾기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --surface: #1a1a2e;
    --border: #2a2a4a;
    --accent: #00ff88;
    --accent2: #ff3366;
    --accent3: #ffcc00;
    --accent4: #00ccff;
    --text: #e0e0ff;
    --text-dim: #6060a0;
    --cell-bg: #1e1e32;
    --cell-border: #2e2e52;
    --cell-open: #111120;
    --cell-hover: #252540;
    --shadow-accent: 0 0 20px rgba(0,255,136,0.3);
    --shadow-red: 0 0 20px rgba(255,51,102,0.5);
    --shadow-blue: 0 0 15px rgba(0,204,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Animated grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    animation: gridDrift 20s linear infinite;
  }

  @keyframes gridDrift {
    0% { transform: translate(0,0); }
    100% { transform: translate(40px, 40px); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 32px 20px 16px;
    width: 100%;
  }

  .title-main {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(18px, 4vw, 32px);
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(0,255,136,0.4);
    letter-spacing: 4px;
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(0,255,136,0.4); }
    50% { text-shadow: 0 0 20px var(--accent), 0 0 60px rgba(0,255,136,0.6), 0 0 100px rgba(0,255,136,0.2); }
  }

  .title-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 6px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Main layout */
  .main-container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 0 16px 40px;
    width: 100%;
    max-width: 900px;
  }

  /* Control Panel */
  .control-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    width: 100%;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .panel-title {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before, .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    align-items: end;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .control-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }

  .control-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  .control-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }

  .control-row input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .control-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }

  .preset-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    flex: 1;
    min-width: 80px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 1px;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0,255,136,0.2);
  }

  .preset-btn.active {
    border-color: var(--accent);
    background: rgba(0,255,136,0.1);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,255,136,0.3);
  }

  /* HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 12px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
  }

  .hud-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hud-stat:last-child {
    align-items: flex-end;
  }

  .hud-label {
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    line-height: 1;
  }

  .hud-value.mines { color: var(--accent2); text-shadow: 0 0 10px rgba(255,51,102,0.5); }
  .hud-value.timer { color: var(--accent4); text-shadow: 0 0 10px rgba(0,204,255,0.5); }

  /* Start button */
  .start-btn {
    padding: 14px 28px;
    background: transparent;
    border: 2px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: var(--shadow-accent);
    white-space: nowrap;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
  }

  .start-btn:hover::before { transform: translateX(0); }
  .start-btn:hover { color: var(--bg); box-shadow: 0 0 30px rgba(0,255,136,0.6); }

  .start-btn span { position: relative; z-index: 1; }

  /* Game board container */
  .board-wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
    overflow-x: auto;
    padding: 4px;
  }

  .board {
    display: grid;
    gap: 2px;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 4px 40px rgba(0,0,0,0.6);
    position: relative;
  }

  /* Cell */
  .cell {
    width: 34px;
    height: 34px;
    background: var(--cell-bg);
    border: 1px solid var(--cell-border);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    font-weight: 700;
    transition: all 0.08s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
    pointer-events: none;
    border-radius: 4px;
  }

  .cell:hover:not(.open):not(.exploded) {
    background: var(--cell-hover);
    border-color: rgba(0,255,136,0.3);
    transform: scale(1.05);
    z-index: 2;
    box-shadow: 0 0 10px rgba(0,255,136,0.15);
  }

  .cell.open {
    background: var(--cell-open);
    border-color: rgba(255,255,255,0.04);
    cursor: default;
    transform: none;
  }

  .cell.flagged {
    background: rgba(255,51,102,0.12);
    border-color: rgba(255,51,102,0.4);
  }

  .cell.question {
    background: rgba(255,204,0,0.1);
    border-color: rgba(255,204,0,0.4);
  }

  .cell.exploded {
    background: rgba(255,51,102,0.35);
    border-color: var(--accent2);
    animation: explodeCell 0.3s ease-out;
    box-shadow: 0 0 20px rgba(255,51,102,0.6);
    cursor: default;
  }

  .cell.mine-revealed {
    background: rgba(255,51,102,0.1);
    border-color: rgba(255,51,102,0.3);
    cursor: default;
  }

  .cell.safe-revealed {
    background: rgba(0,255,136,0.08);
    border-color: rgba(0,255,136,0.25);
    cursor: default;
  }

  @keyframes explodeCell {
    0% { transform: scale(1.5); }
    60% { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  .cell.open-anim {
    animation: openCell 0.15s ease-out;
  }

  @keyframes openCell {
    0% { transform: scale(0.85); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Number colors */
  .n1 { color: #4488ff; }
  .n2 { color: #44cc88; }
  .n3 { color: #ff4466; }
  .n4 { color: #8844ff; }
  .n5 { color: #ff8800; }
  .n6 { color: #00ccff; }
  .n7 { color: #ff44cc; }
  .n8 { color: #aaaaaa; }

  /* Cell icons */
  .cell-icon { font-size: 16px; line-height: 1; }

  /* Overlay */
  .game-overlay {
    position: absolute;
    inset: 0;
    border-radius: 11px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .game-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .game-overlay.win {
    background: rgba(0,255,136,0.12);
    backdrop-filter: blur(4px);
  }

  .game-overlay.lose {
    background: rgba(255,51,102,0.12);
    backdrop-filter: blur(4px);
  }

  .overlay-title {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3vw, 28px);
    text-align: center;
    animation: overlayPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .win .overlay-title { color: var(--accent); text-shadow: var(--shadow-accent); }
  .lose .overlay-title { color: var(--accent2); text-shadow: var(--shadow-red); }

  .overlay-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-align: center;
  }

  @keyframes overlayPop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Audio controls */
  .audio-controls {
    display: flex;
    gap: 8px;
  }

  .audio-btn {
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .audio-btn:hover, .audio-btn.active {
    border-color: var(--accent4);
    color: var(--accent4);
  }

  /* Footer */
  .footer {
    position: relative;
    z-index: 10;
    padding: 16px;
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* Particle canvas */
  #particleCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent3));
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .cell { width: 28px; height: 28px; font-size: 8px; }
    .cell-icon { font-size: 13px; }
    .hud-value { font-size: 15px; }
  }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<header>
  <div class="title-main">💣 MINESWEEPER</div>
  <div class="title-sub">지뢰찾기 — 위험 구역 탐색</div>
</header>

<div class="main-container">

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="panel-title">MISSION CONFIG</div>
    <div class="controls-grid">
      <div class="control-group">
        <div class="control-label">PRESET</div>
        <div class="preset-row">
          <button class="preset-btn" onclick="setPreset('easy')">EASY</button>
          <button class="preset-btn" onclick="setPreset('medium')">MED</button>
          <button class="preset-btn" onclick="setPreset('hard')">HARD</button>
          <button class="preset-btn" onclick="setPreset('expert')">EXP</button>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">COLUMNS — <span id="colsLabel">9</span></div>
        <div class="control-row">
          <input type="range" id="colsSlider" min="5" max="30" value="9" oninput="updateSlider('cols',this.value)">
          <span class="control-value" id="colsVal">9</span>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">ROWS — <span id="rowsLabel">9</span></div>
        <div class="control-row">
          <input type="range" id="rowsSlider" min="5" max="24" value="9" oninput="updateSlider('rows',this.value)">
          <span class="control-value" id="rowsVal">9</span>
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">MINES — <span id="minesLabel">10</span></div>
        <div class="control-row">
          <input type="range" id="minesSlider" min="1" max="200" value="10" oninput="updateSlider('mines',this.value)">
          <span class="control-value" id="minesVal">10</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="mineProgress" style="width:12%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-stat">
      <div class="hud-label">💣 MINES</div>
      <div class="hud-value mines" id="mineCount">10</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <button class="start-btn" onclick="startGame()"><span>▶ START</span></button>
      <div class="audio-controls">
        <button class="audio-btn active" id="bgmBtn" onclick="toggleBGM()">♪ BGM</button>
        <button class="audio-btn active" id="sfxBtn" onclick="toggleSFX()">♬ SFX</button>
      </div>
    </div>
    <div class="hud-stat" style="align-items:flex-end">
      <div class="hud-label">⏱ TIME</div>
      <div class="hud-value timer" id="timerDisplay">000</div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <div class="board" id="board">
      <div class="game-overlay" id="gameOverlay">
        <div class="overlay-title" id="overlayTitle"></div>
        <div class="overlay-sub" id="overlaySub"></div>
        <button class="start-btn" onclick="startGame()"><span>▶ RETRY</span></button>
      </div>
    </div>
  </div>

</div>

<div class="footer">RIGHT CLICK = FLAG • MIDDLE CLICK = QUESTION MARK • AVOID THE MINES</div>

<script>
// ===================== AUDIO ENGINE =====================
const AC = new (window.AudioContext || window.webkitAudioContext)();
let bgmPlaying = false;
let sfxEnabled = true;
let bgmEnabled = true;
let bgmNodes = [];
let bgmInterval = null;

function resumeAC() {
  if (AC.state === 'suspended') AC.resume();
}

// BGM: Ambient chiptune loop
function startBGM() {
  if (!bgmEnabled) return;
  stopBGM();
  bgmPlaying = true;
  playAmbientBGM();
}

function stopBGM() {
  bgmPlaying = false;
  bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
  bgmNodes = [];
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function toggleBGM() {
  bgmEnabled = !bgmEnabled;
  document.getElementById('bgmBtn').classList.toggle('active', bgmEnabled);
  if (bgmEnabled) startBGM();
  else stopBGM();
}

function toggleSFX() {
  sfxEnabled = !sfxEnabled;
  document.getElementById('sfxBtn').classList.toggle('active', sfxEnabled);
}

function note(freq, start, dur, type='square', vol=0.06, filter=null) {
  const osc = AC.createOscillator();
  const gain = AC.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, AC.currentTime + start);

  let node = gain;
  if (filter) {
    const filt = AC.createBiquadFilter();
    filt.type = filter.type || 'lowpass';
    filt.frequency.setValueAtTime(filter.freq || 800, AC.currentTime);
    filt.Q.setValueAtTime(filter.Q || 1, AC.currentTime);
    gain.connect(filt);
    filt.connect(AC.destination);
    node = filt;
  } else {
    gain.connect(AC.destination);
  }

  gain.gain.setValueAtTime(0, AC.currentTime + start);
  gain.gain.linearRampToValueAtTime(vol, AC.currentTime + start + 0.01);
  gain.gain.linearRampToValueAtTime(vol * 0.7, AC.currentTime + start + dur * 0.6);
  gain.gain.linearRampToValueAtTime(0, AC.currentTime + start + dur);
  osc.connect(gain);
  osc.start(AC.currentTime + start);
  osc.stop(AC.currentTime + start + dur + 0.05);
  bgmNodes.push(osc);
  return osc;
}

function playAmbientBGM() {
  // Chiptune melody sequence
  const melody = [
    [261.63, 0.0], [329.63, 0.25], [392.00, 0.5], [329.63, 0.75],
    [293.66, 1.0], [261.63, 1.25], [220.00, 1.5], [261.63, 1.75],
    [329.63, 2.0], [392.00, 2.25], [440.00, 2.5], [392.00, 2.75],
    [349.23, 3.0], [329.63, 3.25], [293.66, 3.5], [261.63, 3.75],
  ];

  const bass = [
    [65.41, 0.0], [65.41, 0.5], [73.42, 1.0], [73.42, 1.5],
    [61.74, 2.0], [61.74, 2.5], [65.41, 3.0], [65.41, 3.5],
  ];

  const loopLen = 4.2;

  function playLoop() {
    if (!bgmPlaying) return;
    melody.forEach(([f, t]) => note(f, t, 0.22, 'square', 0.04));
    bass.forEach(([f, t]) => note(f*2, t, 0.45, 'triangle', 0.05));
    // Arp
    [523.25, 659.25, 783.99, 659.25].forEach((f,i) => note(f, i*0.125 + 1.0, 0.1, 'square', 0.025));
    [523.25, 659.25, 783.99, 1046.50].forEach((f,i) => note(f, i*0.125 + 3.0, 0.1, 'square', 0.025));
    bgmInterval = setTimeout(playLoop, loopLen * 1000);
  }

  playLoop();
}

// SFX functions
function sfxClick() {
  if (!sfxEnabled) return;
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(440, AC.currentTime + 0.05);
  g.gain.setValueAtTime(0.15, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + 0.08);
  osc.connect(g); g.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime + 0.1);
}

function sfxFlag() {
  if (!sfxEnabled) return;
  [800, 1200].forEach((f, i) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(f, AC.currentTime + i*0.06);
    g.gain.setValueAtTime(0.08, AC.currentTime + i*0.06);
    g.gain.linearRampToValueAtTime(0, AC.currentTime + i*0.06 + 0.06);
    osc.connect(g); g.connect(AC.destination);
    osc.start(AC.currentTime + i*0.06);
    osc.stop(AC.currentTime + i*0.06 + 0.08);
  });
}

function sfxQuestion() {
  if (!sfxEnabled) return;
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(600, AC.currentTime);
  osc.frequency.linearRampToValueAtTime(900, AC.currentTime + 0.1);
  osc.frequency.linearRampToValueAtTime(700, AC.currentTime + 0.18);
  g.gain.setValueAtTime(0.1, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + 0.2);
  osc.connect(g); g.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime + 0.22);
}

function sfxExplode() {
  if (!sfxEnabled) return;
  // Noise burst
  const bufLen = AC.sampleRate * 0.6;
  const buf = AC.createBuffer(1, bufLen, AC.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufLen, 1.5);
  const src = AC.createBufferSource();
  src.buffer = buf;
  const filt = AC.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(400, AC.currentTime);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.8, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + 0.6);
  src.connect(filt); filt.connect(g); g.connect(AC.destination);
  src.start(); src.stop(AC.currentTime + 0.65);

  // Low boom
  const osc = AC.createOscillator();
  const g2 = AC.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(20, AC.currentTime + 0.4);
  g2.gain.setValueAtTime(0.5, AC.currentTime);
  g2.gain.linearRampToValueAtTime(0, AC.currentTime + 0.4);
  osc.connect(g2); g2.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime + 0.45);
}

function sfxWin() {
  if (!sfxEnabled) return;
  const winNotes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
  winNotes.forEach((f, i) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(f, AC.currentTime + i * 0.12);
    g.gain.setValueAtTime(0, AC.currentTime + i*0.12);
    g.gain.linearRampToValueAtTime(0.12, AC.currentTime + i*0.12 + 0.01);
    g.gain.linearRampToValueAtTime(0, AC.currentTime + i*0.12 + 0.22);
    osc.connect(g); g.connect(AC.destination);
    osc.start(AC.currentTime + i*0.12);
    osc.stop(AC.currentTime + i*0.12 + 0.25);
  });
}

function sfxOpen() {
  if (!sfxEnabled) return;
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, AC.currentTime);
  osc.frequency.linearRampToValueAtTime(500, AC.currentTime + 0.04);
  g.gain.setValueAtTime(0.05, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + 0.05);
  osc.connect(g); g.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime + 0.06);
}

// ===================== PARTICLES =====================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles(x, y, color, count=20) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - Math.random() * 4,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 5 + 2,
      color
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ===================== GAME STATE =====================
let COLS = 9, ROWS = 9, MINES = 10;
let board = [], revealed = [], flagged = [], question = [];
let gameState = 'idle'; // idle | playing | won | lost
let firstClick = true;
let timerVal = 0, timerInterval = null;
let minesLeft = 10;

function updateSlider(type, val) {
  val = parseInt(val);
  const maxMines = COLS * ROWS - 9;

  if (type === 'cols') {
    COLS = val;
    document.getElementById('colsVal').textContent = val;
    document.getElementById('colsLabel').textContent = val;
    document.getElementById('colsSlider').value = val;
  } else if (type === 'rows') {
    ROWS = val;
    document.getElementById('rowsVal').textContent = val;
    document.getElementById('rowsLabel').textContent = val;
    document.getElementById('rowsSlider').value = val;
  } else if (type === 'mines') {
    MINES = Math.min(val, COLS * ROWS - 9);
    document.getElementById('minesVal').textContent = MINES;
    document.getElementById('minesLabel').textContent = MINES;
    document.getElementById('minesSlider').value = val;
  }

  // Clamp mines
  const newMax = COLS * ROWS - 9;
  if (MINES > newMax) {
    MINES = Math.max(1, newMax);
    document.getElementById('minesVal').textContent = MINES;
    document.getElementById('minesSlider').value = MINES;
  }
  document.getElementById('minesSlider').max = Math.max(1, newMax);

  // Update progress
  const pct = (MINES / (COLS * ROWS)) * 100;
  document.getElementById('mineProgress').style.width = pct + '%';
  document.getElementById('mineCount').textContent = MINES;

  // Clear active preset
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function setPreset(preset) {
  const presets = {
    easy:   { cols: 9,  rows: 9,  mines: 10 },
    medium: { cols: 16, rows: 16, mines: 40 },
    hard:   { cols: 30, rows: 16, mines: 99 },
    expert: { cols: 30, rows: 24, mines: 180 }
  };
  const p = presets[preset];
  COLS = p.cols; ROWS = p.rows; MINES = p.mines;

  document.getElementById('colsSlider').value = COLS;
  document.getElementById('rowsSlider').value = ROWS;
  document.getElementById('minesSlider').value = MINES;
  document.getElementById('colsVal').textContent = COLS;
  document.getElementById('rowsVal').textContent = ROWS;
  document.getElementById('minesVal').textContent = MINES;
  document.getElementById('colsLabel').textContent = COLS;
  document.getElementById('rowsLabel').textContent = ROWS;
  document.getElementById('minesLabel').textContent = MINES;
  document.getElementById('minesSlider').max = COLS * ROWS - 9;

  const pct = (MINES / (COLS * ROWS)) * 100;
  document.getElementById('mineProgress').style.width = pct + '%';
  document.getElementById('mineCount').textContent = MINES;

  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(preset.slice(0,3)));
  });
}

// ===================== GAME LOGIC =====================
function startGame() {
  resumeAC();
  stopTimer();
  gameState = 'playing';
  firstClick = true;
  minesLeft = MINES;

  // Init arrays
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  question = Array.from({length: ROWS}, () => Array(COLS).fill(false));

  document.getElementById('mineCount').textContent = MINES;
  document.getElementById('timerDisplay').textContent = '000';
  renderBoard();

  document.getElementById('gameOverlay').className = 'game-overlay';
  document.getElementById('gameOverlay').classList.remove('show','win','lose');

  if (bgmEnabled) startBGM();
}

function placeMines(safeR, safeC) {
  const cells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (Math.abs(r - safeR) > 1 || Math.abs(c - safeC) > 1) cells.push([r,c]);

  // Shuffle
  for (let i = cells.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [cells[i], cells[j]] = [cells[j], cells[i]];
  }

  const mineCount = Math.min(MINES, cells.length);
  for (let i = 0; i < mineCount; i++) {
    const [r, c] = cells[i];
    board[r][c] = -1;
  }

  // Compute numbers
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] !== -1) {
        let cnt = 0;
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r+dr, nc = c+dc;
            if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc]===-1) cnt++;
          }
        board[r][c] = cnt;
      }
}

function revealCell(r, c) {
  if (r<0||r>=ROWS||c<0||c>=COLS||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c] = true;
  question[r][c] = false;

  const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (cell) {
    cell.classList.add('open', 'open-anim');
    cell.classList.remove('flagged', 'question');
    renderCell(cell, r, c);
  }

  if (board[r][c] === 0) {
    for (let dr=-1;dr<=1;dr++)
      for (let dc=-1;dc<=1;dc++)
        revealCell(r+dr, c+dc);
  }
}

function handleCellClick(r, c) {
  if (gameState !== 'playing') return;
  if (revealed[r][c] || flagged[r][c]) return;

  resumeAC();

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  if (board[r][c] === -1) {
    // BOOM
    revealed[r][c] = true;
    const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (cell) {
      cell.classList.add('exploded');
      cell.innerHTML = '<span class="cell-icon">💥</span>';
      const rect = cell.getBoundingClientRect();
      spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ff3366', 30);
    }
    sfxExplode();
    gameOver(false);
    return;
  }

  sfxOpen();
  revealCell(r, c);
  checkWin();
}

function handleRightClick(e, r, c) {
  e.preventDefault();
  if (gameState !== 'playing' || revealed[r][c]) return;
  resumeAC();

  const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (!flagged[r][c] && !question[r][c]) {
    flagged[r][c] = true;
    minesLeft--;
    sfxFlag();
    const rect = cell.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, '#ff3366', 8);
  } else if (flagged[r][c]) {
    flagged[r][c] = false;
    question[r][c] = true;
    minesLeft++;
    sfxQuestion();
  } else {
    question[r][c] = false;
  }

  document.getElementById('mineCount').textContent = minesLeft;
  if (cell) renderCell(cell, r, c);
}

function handleMiddleClick(e, r, c) {
  e.preventDefault();
  if (gameState !== 'playing' || revealed[r][c] || flagged[r][c]) return;
  resumeAC();
  const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  question[r][c] = !question[r][c];
  if (question[r][c]) sfxQuestion();
  if (cell) renderCell(cell, r, c);
}

// Chord reveal: click on revealed number with enough flags
function handleChordClick(r, c) {
  if (!revealed[r][c] || board[r][c] <= 0) return;
  let flagCount = 0;
  for (let dr=-1;dr<=1;dr++)
    for (let dc=-1;dc<=1;dc++) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&flagged[nr][nc]) flagCount++;
    }
  if (flagCount === board[r][c]) {
    let hitMine = false;
    for (let dr=-1;dr<=1;dr++)
      for (let dc=-1;dc<=1;dc++) {
        const nr=r+dr, nc=c+dc;
        if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!flagged[nr][nc]&&!revealed[nr][nc]) {
          if (board[nr][nc]===-1) {
            hitMine = true;
            revealed[nr][nc] = true;
            const cell = document.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
            if (cell) {
              cell.classList.add('exploded');
              cell.innerHTML = '<span class="cell-icon">💥</span>';
              const rect = cell.getBoundingClientRect();
              spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, '#ff3366', 30);
            }
          } else {
            revealCell(nr, nc);
          }
        }
      }
    if (hitMine) { sfxExplode(); gameOver(false); }
    else { sfxOpen(); checkWin(); }
  }
}

function checkWin() {
  let unrevealed = 0;
  for (let r=0;r<ROWS;r++)
    for (let c=0;c<COLS;c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === MINES) gameOver(true);
}

function gameOver(win) {
  gameState = win ? 'won' : 'lost';
  stopTimer();

  const overlay = document.getElementById('gameOverlay');
  const title = document.getElementById('overlayTitle');
  const sub = document.getElementById('overlaySub');

  if (win) {
    sfxWin();
    stopBGM();
    overlay.classList.add('win');
    title.textContent = '✓ MISSION CLEAR';
    sub.textContent = `TIME: ${String(timerVal).padStart(3,'0')}s — ALL MINES AVOIDED`;
    // Flag all mines
    for (let r=0;r<ROWS;r++)
      for (let c=0;c<COLS;c++)
        if (board[r][c]===-1) {
          flagged[r][c] = true;
          const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
          if (cell) { cell.classList.add('safe-revealed'); renderCell(cell,r,c); }
          const rect = cell ? cell.getBoundingClientRect() : {left:300,top:300,width:34,height:34};
          spawnParticles(rect.left+rect.width/2, rect.top+rect.height/2, '#00ff88', 12);
        }
    document.getElementById('mineCount').textContent = 0;
  } else {
    stopBGM();
    overlay.classList.add('lose');
    title.textContent = '✕ MISSION FAIL';
    sub.textContent = 'YOU HIT A MINE — TRY AGAIN';
    // Reveal all mines
    for (let r=0;r<ROWS;r++)
      for (let c=0;c<COLS;c++)
        if (board[r][c]===-1 && !revealed[r][c]) {
          const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
          if (cell) {
            cell.classList.add('mine-revealed');
            cell.innerHTML = '<span class="cell-icon">💣</span>';
          }
        } else if (board[r][c]!==-1 && flagged[r][c]) {
          const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
          if (cell) { cell.innerHTML = '<span class="cell-icon">❌</span>'; }
        }
  }

  overlay.classList.add('show');
}

// ===================== TIMER =====================
function startTimer() {
  timerVal = 0;
  timerInterval = setInterval(() => {
    timerVal++;
    document.getElementById('timerDisplay').textContent = String(timerVal).padStart(3,'0');
    if (timerVal >= 999) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ===================== RENDERING =====================
function renderCell(cell, r, c) {
  cell.className = 'cell';
  cell.innerHTML = '';

  if (revealed[r][c]) {
    cell.classList.add('open');
    if (board[r][c] > 0) {
      cell.classList.add(`n${board[r][c]}`);
      cell.textContent = board[r][c];
    }
  } else if (flagged[r][c]) {
    cell.classList.add('flagged');
    cell.innerHTML = '<span class="cell-icon">🚩</span>';
  } else if (question[r][c]) {
    cell.classList.add('question');
    cell.innerHTML = '<span class="cell-icon">❓</span>';
  }
}

function renderBoard() {
  const boardEl = document.getElementById('board');

  // Remove all cells but keep overlay
  const overlay = document.getElementById('gameOverlay');
  boardEl.innerHTML = '';
  boardEl.appendChild(overlay);

  boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      cell.addEventListener('click', () => {
        if (revealed[r][c] && board[r][c] > 0) handleChordClick(r, c);
        else handleCellClick(r, c);
      });
      cell.addEventListener('contextmenu', e => handleRightClick(e, r, c));
      cell.addEventListener('mousedown', e => { if (e.button === 1) handleMiddleClick(e, r, c); });
      // Touch: long press = flag
      let pressTimer;
      cell.addEventListener('touchstart', e => {
        pressTimer = setTimeout(() => {
          e.preventDefault();
          handleRightClick({ preventDefault: ()=>{} }, r, c);
        }, 400);
      });
      cell.addEventListener('touchend', () => clearTimeout(pressTimer));
      cell.addEventListener('touchmove', () => clearTimeout(pressTimer));

      boardEl.appendChild(cell);
    }
  }
}

// ===================== INIT =====================
setPreset('easy');
renderBoard();
</script>
